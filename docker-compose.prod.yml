services:

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile

    container_name: aws_api

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile

    container_name: aws_worker

    env_file:
      - .env

    depends_on:
      - redis
      - postgres

  nginx:
    image: nginx:latest

    container_name: aws_nginx

    ports:
      - "80:80"

    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - api

  postgres:
    image: postgres:16

    container_name: aws_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: adaptive_workflow_db

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: aws_redis

    ports:
      - "6379:6379"

volumes:
  postgres_data: